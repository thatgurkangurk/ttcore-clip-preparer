name: Build and Release Rust Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ttcore-clip-preparer
  MISE_EXPERIMENTAL: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    # Dynamically select the runner OS based on the matrix target
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      # ------------------------
      # Toolchain: mise & Rust
      # ------------------------
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true # Triggers installation from .mise.toml / .tool-versions

      - name: Install Rust Target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      # ------------------------
      # Linux: download ffmpeg
      # ------------------------
      - name: Install FFmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Download BtbN's pre-compiled Linux shared libraries
          curl -f -sL https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl-shared.tar.xz -o ffmpeg-linux.tar.xz
          tar -xf ffmpeg-linux.tar.xz
          
          # Rename for predictable path
          EXTRACTED_DIR=$(ls -d ffmpeg-master-latest-linux64-gpl-shared | head -n 1)
          mv "$EXTRACTED_DIR" ffmpeg-linux
          
          # Force ffmpeg-next to use these binaries instead of system pkg-config
          echo "FFMPEG_DIR=$GITHUB_WORKSPACE/ffmpeg-linux" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/ffmpeg-linux/lib/pkgconfig" >> $GITHUB_ENV
          
          # Ensure the linker can find the .so files during the build process
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/ffmpeg-linux/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      # ------------------------
      # Windows: Download FFmpeg 8.1 Branch Headers
      # ------------------------
      - name: Install FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Added -f so curl fails immediately if the file doesn't exist
          # Swapped back to 'master-latest' which is guaranteed to exist and has the newest 8.x features
          curl -f -sL https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip -o ffmpeg-win.zip
          
          unzip -q ffmpeg-win.zip -d ffmpeg-win
          
          # Dynamically find the extracted folder and rename it
          EXTRACTED_DIR=$(ls -d ffmpeg-win/ffmpeg-* | head -n 1)
          mv "$EXTRACTED_DIR" ffmpeg-win/ffmpeg
          
          # Tell ffmpeg-next where to find the headers and import libraries
          echo "FFMPEG_DIR=$GITHUB_WORKSPACE/ffmpeg-win/ffmpeg" >> $GITHUB_ENV

      # ------------------------
      # Rust Cache
      # ------------------------
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-fast
          cache-all-crates: true

      # ------------------------
      # Build (Native Cargo)
      # ------------------------
      - name: Build
        shell: bash
        run: |
          # Cross is gone. Native cargo via mise.
          cargo build --release --target ${{ matrix.target }}

      # ------------------------
      # Package Binary
      # ------------------------
      - name: Prepare Artifact
        id: prep
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"

          if [[ "$TARGET" == *windows* ]]; then
            EXT=".exe"
          else
            EXT=""
          fi

          OUT="${BIN_NAME}-${TARGET}${EXT}"
          cp target/${TARGET}/release/${BIN_NAME}${EXT} $OUT
          echo "out_name=$OUT" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.out_name }}
          path: ${{ steps.prep.outputs.out_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true 

      # ------------------------
      # Version + Tag Validation
      # ------------------------
      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Enforce Version Change
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists. Please bump your Cargo.toml version."
            exit 1
          fi

      # ------------------------
      # Changelog
      # ------------------------
      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-v:refname | head -n1 || true)

          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)")
          else
            LOG=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)")
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------
      # Release Publish
      # ------------------------
      - name: Create Tag + Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ttcore-clip-preparer v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}